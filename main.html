<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Locator</title>
    <link rel="stylesheet" href="main.css" />
</head>

<body>
    <div class="app-shell">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="header-clock">
                    <span class="clock" id="liveClock">--:--:--</span>
                    <span class="date" id="dayDateDisplay"></span>
                </div>
            </div>
            <div class="header-center">
                <h1>Staff Locator</h1>
                <p class="header-sub">John Paul School</p>
            </div>
            <div class="header-right">
                <span class="pill pill-neutral" id="headerDayBadge">Day –</span>
                <span class="pill pill-neutral" id="headerStatusBadge">—</span>
                <button class="login-btn" id="loginBtn">Login</button>
            </div>
        </div>

        <div class="page-content">
            <!-- Dashboard -->
            <div class="dashboard">
                <!-- Left Panel -->
                <div class="teacher-panel">
                    <div class="panel-title">
                        Teachers
                        <span class="count" id="teacherCount"></span>
                    </div>
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                            <circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="2" />
                            <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search..." />
                        <button class="clear" id="clearSearchBtn">×</button>
                    </div>
                    <div class="teacher-list" id="teacherListContainer">
                        <div class="loading">Loading teachers...</div>
                    </div>
                </div>

                <!-- Right Panel -->
                <div class="timetable-panel" id="dropZonePanel">
                    <div class="timetable-header">
                        <div class="selected" id="selectedTeacherName">Select a teacher</div>
                        <button class="clear-btn" id="clearListBtn">Clear</button>
                    </div>

                    <div class="status" id="statusDisplay">
                        <div class="empty">Select a teacher to view their status</div>
                    </div>

                    <div class="timetable-list" id="timetableView">
                        <div class="drop-msg">
                            <div class="main">Click or drag a teacher to view timetable</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer>
                Staff Locator
            </footer>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Locator — JPC</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-bar">
    <div class="brand">
      <h1>Staff Locator</h1>
      <p class="brand-sub">John Paul College</p>
    </div>
    <div class="top-actions">
      <span class="clock" id="clock">--:--</span>
      <span class="status-pill" id="period-status">Loading…</span>
      <a class="btn-admin" href="admin.html">Admin</a>
    </div>
  </header>

  <main class="layout">
    <section class="panel-left" aria-label="Faculty list">
      <div class="panel-head">
        <h2>Teachers</h2>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="search" id="faculty-search" placeholder="Search…" aria-label="Search teachers">
        </div>
      </div>
      <ul class="faculty-list" id="faculty-list" role="list"></ul>

      <div class="absent-section">
        <div class="panel-head">
          <h2>Absent today</h2>
          <span class="count-pill" id="absent-count">0</span>
        </div>
        <ul class="absent-list" id="absent-list" role="list">
          <li class="absent-empty" id="absent-empty">None today.</li>
        </ul>
      </div>
    </section>

    <section class="panel-centre" aria-label="Teacher details" id="drop-zone">
      <div id="drop-empty">
        <p>Drag or click a teacher to see their location.</p>
      </div>
      <div class="detail-card" id="detail-card" hidden></div>
    </section>
  </main>

  <footer class="bottom-bar">
    <span>Updated <time id="updated-time">just now</time></span>
    <span class="dot" aria-hidden="true"></span>
    <span>John Paul College</span>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
